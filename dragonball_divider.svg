<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 30" width="100%">
  <defs>
    <linearGradient id="beam" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6600" stop-opacity="0"/>
      <stop offset="8%" stop-color="#FF8C00"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="92%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF6600" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6600" stop-opacity="0"/>
      <stop offset="8%" stop-color="#FF8C00" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.2"/>
      <stop offset="92%" stop-color="#FF8C00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6600" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ball" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#FFE680"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#CC5500"/>
    </radialGradient>
    <polygon id="star" points="0,-1.4 0.37,-0.51 1.33,-0.43 0.60,0.19 0.82,1.13 0,0.63 -0.82,1.13 -0.60,0.19 -1.33,-0.43 -0.37,-0.51" fill="#CC0000"/>
  </defs>

  <!-- Ki energy beam -->
  <rect x="0" y="10" width="900" height="10" rx="5" fill="url(#glow)"/>
  <rect x="0" y="12" width="900" height="6" rx="3" fill="url(#beam)" opacity="0.4"/>
  <rect x="0" y="14" width="900" height="2" rx="1" fill="url(#beam)"/>

  <!-- Energy particles -->
  <circle cx="35" cy="15" r="0.8" fill="#FFD700" opacity="0.4"/>
  <circle cx="68" cy="14" r="0.5" fill="#FFAA00" opacity="0.35"/>
  <circle cx="155" cy="16" r="0.7" fill="#FFD700" opacity="0.4"/>
  <circle cx="190" cy="14" r="0.5" fill="#FFAA00" opacity="0.3"/>
  <circle cx="275" cy="16" r="0.7" fill="#FFD700" opacity="0.4"/>
  <circle cx="305" cy="14" r="0.5" fill="#FFAA00" opacity="0.35"/>
  <circle cx="390" cy="16" r="0.7" fill="#FFD700" opacity="0.4"/>
  <circle cx="420" cy="14" r="0.5" fill="#FFAA00" opacity="0.3"/>
  <circle cx="505" cy="16" r="0.7" fill="#FFD700" opacity="0.4"/>
  <circle cx="535" cy="14" r="0.5" fill="#FFAA00" opacity="0.35"/>
  <circle cx="615" cy="16" r="0.7" fill="#FFD700" opacity="0.4"/>
  <circle cx="645" cy="14" r="0.5" fill="#FFAA00" opacity="0.3"/>
  <circle cx="730" cy="16" r="0.7" fill="#FFD700" opacity="0.4"/>
  <circle cx="755" cy="14" r="0.5" fill="#FFAA00" opacity="0.35"/>
  <circle cx="835" cy="16" r="0.7" fill="#FFD700" opacity="0.4"/>
  <circle cx="865" cy="14" r="0.5" fill="#FFAA00" opacity="0.3"/>

  <!-- 1-Star Dragon Ball -->
  <g transform="translate(112,15)">
    <circle r="14" fill="#FF8800" opacity="0.1"/>
    <circle r="10" fill="url(#ball)" stroke="#B85500" stroke-width="0.5"/>
    <circle cx="-2" cy="-2.5" r="3" fill="white" opacity="0.18"/>
    <use href="#star"/>
  </g>

  <!-- 2-Star Dragon Ball -->
  <g transform="translate(225,15)">
    <circle r="14" fill="#FF8800" opacity="0.1"/>
    <circle r="10" fill="url(#ball)" stroke="#B85500" stroke-width="0.5"/>
    <circle cx="-2" cy="-2.5" r="3" fill="white" opacity="0.18"/>
    <use href="#star" x="0" y="-2.5"/>
    <use href="#star" x="0" y="2.5"/>
  </g>

  <!-- 3-Star Dragon Ball -->
  <g transform="translate(338,15)">
    <circle r="14" fill="#FF8800" opacity="0.1"/>
    <circle r="10" fill="url(#ball)" stroke="#B85500" stroke-width="0.5"/>
    <circle cx="-2" cy="-2.5" r="3" fill="white" opacity="0.18"/>
    <use href="#star" x="0" y="-3"/>
    <use href="#star" x="-2.5" y="2"/>
    <use href="#star" x="2.5" y="2"/>
  </g>

  <!-- 4-Star Dragon Ball (center - Goku's ball) -->
  <g transform="translate(450,15)">
    <circle r="14" fill="#FF8800" opacity="0.1"/>
    <circle r="10" fill="url(#ball)" stroke="#B85500" stroke-width="0.5"/>
    <circle cx="-2" cy="-2.5" r="3" fill="white" opacity="0.18"/>
    <use href="#star" x="0" y="-3"/>
    <use href="#star" x="3" y="0"/>
    <use href="#star" x="0" y="3"/>
    <use href="#star" x="-3" y="0"/>
  </g>

  <!-- 5-Star Dragon Ball -->
  <g transform="translate(562,15)">
    <circle r="14" fill="#FF8800" opacity="0.1"/>
    <circle r="10" fill="url(#ball)" stroke="#B85500" stroke-width="0.5"/>
    <circle cx="-2" cy="-2.5" r="3" fill="white" opacity="0.18"/>
    <use href="#star" x="0" y="-3.8"/>
    <use href="#star" x="3.6" y="-1.1"/>
    <use href="#star" x="2.2" y="3"/>
    <use href="#star" x="-2.2" y="3"/>
    <use href="#star" x="-3.6" y="-1.1"/>
  </g>

  <!-- 6-Star Dragon Ball -->
  <g transform="translate(675,15)">
    <circle r="14" fill="#FF8800" opacity="0.1"/>
    <circle r="10" fill="url(#ball)" stroke="#B85500" stroke-width="0.5"/>
    <circle cx="-2" cy="-2.5" r="3" fill="white" opacity="0.18"/>
    <use href="#star" x="-2.2" y="-3"/>
    <use href="#star" x="2.2" y="-3"/>
    <use href="#star" x="-3.8" y="1"/>
    <use href="#star" x="3.8" y="1"/>
    <use href="#star" x="-2.2" y="4"/>
    <use href="#star" x="2.2" y="4"/>
  </g>

  <!-- 7-Star Dragon Ball -->
  <g transform="translate(788,15)">
    <circle r="14" fill="#FF8800" opacity="0.1"/>
    <circle r="10" fill="url(#ball)" stroke="#B85500" stroke-width="0.5"/>
    <circle cx="-2" cy="-2.5" r="3" fill="white" opacity="0.18"/>
    <use href="#star" x="0" y="0"/>
    <use href="#star" x="0" y="-3.8"/>
    <use href="#star" x="3.3" y="-1.9"/>
    <use href="#star" x="3.3" y="1.9"/>
    <use href="#star" x="0" y="3.8"/>
    <use href="#star" x="-3.3" y="1.9"/>
    <use href="#star" x="-3.3" y="-1.9"/>
  </g>
</svg>
